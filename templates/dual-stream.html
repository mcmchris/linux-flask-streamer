<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Dual Videostreaming</title>
     <style>
          body {
               margin: 0;
               padding: 0;
               width: 100%;
               min-height: 100vh;
               background-color: #363636;
               color: rgb(255, 255, 255);
               text-align: center;
               font-family: sans-serif;
          }
          .video-wrapper {
               display: flex;
               justify-content: center;
               flex-wrap: wrap;
               gap: 20px;
               padding: 20px;
          }
          .cam-box {
               background-color: #222;
               padding: 10px;
               border-radius: 8px;
               box-shadow: 0 4px 8px rgba(0,0,0,0.5);
          }
          img {
               max-width: 100%;
               height: auto;
               border-radius: 4px;
          }
     </style>
</head>
<body>
     <h1>Linux Dual Live Streaming</h1>
     <div class="video-wrapper">
         <div class="cam-box">
             <h3>IMX708 (CAM0)</h3>
             <img src="{{ url_for('video_feed_cam0') }}" width="640">
         </div>
         <div class="cam-box">
             <h3>IMX219 (CAM1)</h3>
             <img src="{{ url_for('video_feed_cam1') }}" width="640">
         </div>
     </div>
</body>
</html>
