<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual ISP Control Panel</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #1e1e1e; color: #fff; font-family: Arial, sans-serif; }
        h1 { text-align: center; margin-bottom: 30px; }
        
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .camera-column { background-color: #2b2b2b; border-radius: 10px; padding: 20px; width: 640px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .cam-title { text-align: center; color: #00ff00; margin-top: 0; font-size: 1.2rem; }
        .video-feed { width: 100%; height: auto; border: 2px solid #444; border-radius: 5px; background: #000; margin-bottom: 20px; }
        
        .section-title { font-size: 0.9rem; color: #aaa; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 15px; margin-top: 20px;}
        
        .slider-group { margin-bottom: 15px; }
        .slider-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .slider-group span { color: #00ff00; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ff00; }
    </style>
</head>
<body>

    <h1>Panel de Control ISP Dual</h1>

    <div class="main-container">
        <div class="camera-column">
            <h2 class="cam-title">IMX708 (Puerto 0)</h2>
            <img class="video-feed" src="{{ url_for('video_feed_cam0') }}">
            
            <div class="section-title">Hardware V4L2 (Luz Física)</div>
            <div class="slider-group">
                <label>Exposure <span id="cam0_exp_val">870</span></label>
                <input type="range" id="cam0_exposure" min="10" max="874" step="5" value="870" oninput="updateCam('cam0')">
            </div>
            <div class="slider-group">
                <label>Analogue Gain <span id="cam0_again_val">780</span></label>
                <input type="range" id="cam0_analogue_gain" min="10" max="960" step="5" value="780" oninput="updateCam('cam0')">
            </div>

            <div class="section-title">Software ISP (Color y Contraste)</div>
            <div class="slider-group">
                <label>Red Gain <span id="cam0_r_val">2.50</span></label>
                <input type="range" id="cam0_r_gain" min="0.5" max="4.0" step="0.05" value="2.5" oninput="updateCam('cam0')">
            </div>
            <div class="slider-group">
                <label>Green Gain <span id="cam0_g_val">1.65</span></label>
                <input type="range" id="cam0_g_gain" min="0.5" max="4.0" step="0.05" value="1.65" oninput="updateCam('cam0')">
            </div>
            <div class="slider-group">
                <label>Blue Gain <span id="cam0_b_val">2.90</span></label>
                <input type="range" id="cam0_b_gain" min="0.5" max="4.0" step="0.05" value="2.9" oninput="updateCam('cam0')">
            </div>
            <div class="slider-group">
                <label>Saturation (CCM) <span id="cam0_sat_val">1.20</span></label>
                <input type="range" id="cam0_saturation" min="0.0" max="4.0" step="0.1" value="1.2" oninput="updateCam('cam0')">
            </div>
            <div class="slider-group">
                <label>Contrast <span id="cam0_c_val">2.30</span></label>
                <input type="range" id="cam0_contrast" min="0.5" max="4.0" step="0.1" value="2.3" oninput="updateCam('cam0')">
            </div>
            <div class="slider-group">
                <label>Brightness <span id="cam0_br_val">5</span></label>
                <input type="range" id="cam0_brightness" min="-100" max="100" step="1" value="5" oninput="updateCam('cam0')">
            </div>
        </div>

        <div class="camera-column">
            <h2 class="cam-title">IMX219 (Puerto 1)</h2>
            <img class="video-feed" src="{{ url_for('video_feed_cam1') }}">
            
            <div class="section-title">Hardware V4L2 (Luz Física)</div>
            <div class="slider-group">
                <label>Exposure <span id="cam1_exp_val">1700</span></label>
                <input type="range" id="cam1_exposure" min="10" max="1703" step="5" value="1700" oninput="updateCam('cam1')">
            </div>
            <div class="slider-group">
                <label>Analogue Gain <span id="cam1_again_val">232</span></label>
                <input type="range" id="cam1_analogue_gain" min="0" max="232" step="2" value="232" oninput="updateCam('cam1')">
            </div>

            <div class="section-title">Software ISP (Color y Contraste)</div>
            <div class="slider-group">
                <label>Red Gain <span id="cam1_r_val">2.50</span></label>
                <input type="range" id="cam1_r_gain" min="0.5" max="4.0" step="0.05" value="2.5" oninput="updateCam('cam1')">
            </div>
            <div class="slider-group">
                <label>Green Gain <span id="cam1_g_val">2.00</span></label>
                <input type="range" id="cam1_g_gain" min="0.5" max="4.0" step="0.05" value="2.0" oninput="updateCam('cam1')">
            </div>
            <div class="slider-group">
                <label>Blue Gain <span id="cam1_b_val">2.65</span></label>
                <input type="range" id="cam1_b_gain" min="0.5" max="4.0" step="0.05" value="2.65" oninput="updateCam('cam1')">
            </div>
            <div class="slider-group">
                <label>Saturation (CCM) <span id="cam1_sat_val">2.50</span></label>
                <input type="range" id="cam1_saturation" min="0.0" max="4.0" step="0.1" value="2.5" oninput="updateCam('cam1')">
            </div>
            <div class="slider-group">
                <label>Contrast <span id="cam1_c_val">2.30</span></label>
                <input type="range" id="cam1_contrast" min="0.5" max="4.0" step="0.1" value="2.3" oninput="updateCam('cam1')">
            </div>
            <div class="slider-group">
                <label>Brightness <span id="cam1_br_val">5</span></label>
                <input type="range" id="cam1_brightness" min="-100" max="100" step="1" value="5" oninput="updateCam('cam1')">
            </div>
        </div>
    </div>

    <script>
        function updateCam(camId) {
            // Recoger valores del DOM según la cámara que se movió
            const exp = document.getElementById(camId + '_exposure').value;
            const again = document.getElementById(camId + '_analogue_gain').value;
            const r_gain = document.getElementById(camId + '_r_gain').value;
            const g_gain = document.getElementById(camId + '_g_gain').value;
            const b_gain = document.getElementById(camId + '_b_gain').value;
            const contrast = document.getElementById(camId + '_contrast').value;
            const brightness = document.getElementById(camId + '_brightness').value;
            const saturation = document.getElementById(camId + '_saturation').value;

            // Actualizar etiquetas visuales
            document.getElementById(camId + '_exp_val').innerText = exp;
            document.getElementById(camId + '_again_val').innerText = again;
            document.getElementById(camId + '_r_val').innerText = parseFloat(r_gain).toFixed(2);
            document.getElementById(camId + '_g_val').innerText = parseFloat(g_gain).toFixed(2);
            document.getElementById(camId + '_b_val').innerText = parseFloat(b_gain).toFixed(2);
            document.getElementById(camId + '_c_val').innerText = parseFloat(contrast).toFixed(2);
            document.getElementById(camId + '_br_val').innerText = brightness;
            document.getElementById(camId + '_sat_val').innerText = parseFloat(saturation).toFixed(2);

            // Enviar datos al backend
            fetch('/update_settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cam_id: camId,
                    exposure: exp,
                    analogue_gain: again,
                    r_gain: r_gain,
                    g_gain: g_gain,
                    b_gain: b_gain,
                    saturation: saturation,
                    contrast: contrast,
                    brightness: brightness
                })
            });
        }
    </script>
</body>
</html>
